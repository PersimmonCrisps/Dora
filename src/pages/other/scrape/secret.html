<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Data - Scraping Practice</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <nav><a href="index.html">Home</a></nav>
            <h1>Level 6: Secret Data</h1>
            <p class="text-muted">ログイン後にのみアクセスできるデータです。</p>
        </header>
        <main id="main-content">
            <div class="card" id="secret-card" style="display: none;">
                <h2 style="color: #4ade80;">㊙️ 機密ユーザーリスト</h2>
                <div style="margin-top: 1.5rem;">
                    <p>このデータは認証されたスクレーパーのみが取得可能です。</p>
                    <ul style="margin-top: 1rem; list-style: none;">
                        <li style="padding: 0.5rem; border-bottom: 1px solid var(--border);">VIP User A: secret_code_777</li>
                        <li style="padding: 0.5rem; border-bottom: 1px solid var(--border);">VIP User B: secret_code_888</li>
                        <li style="padding: 0.5rem;">VIP User C: secret_code_999</li>
                    </ul>
                </div>
                <button class="btn" style="margin-top: 1.5rem;" onclick="localStorage.removeItem('isLoggedIn'); window.location.href='login.html';">Logout</button>
            </div>
            <div id="denied" style="text-align: center; margin-top: 5rem;">
                <h2 style="color: #f87171;">Access Denied</h2>
                <p>ログインしてください。</p>
                <a href="login.html" class="btn" style="margin-top: 1rem;">Go to Login</a>
            </div>
        </main>
        <script>
            if (localStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('secret-card').style.display = 'block';
                document.getElementById('denied').style.display = 'none';
            }
        </script>
    </div>
</body>
</html>
