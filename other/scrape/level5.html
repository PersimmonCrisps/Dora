<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 5 - Product Catalog</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <nav><a href="index.html">Home</a></nav>
            <h1>Level 5: Product Catalog</h1>
            <p class="text-muted">実践的なECサイト形式のページです。</p>
        </header>
        <main>
            <div class="product-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem;">
                <div class="card product-card">
                    <h3 class="product-name">ハイエンド・ヘッドホン</h3>
                    <div class="rating" data-score="4.8">★★★★★ (128)</div>
                    <div class="price" style="font-size: 1.5rem; font-weight: 800; color: #818cf8; margin-top: 1rem;">¥35,800</div>
                </div>
            </div>
        </main>
        <footer class="footer"><p>&copy; 2026 Scraping Practice Site.</p></footer>
    </div>
</body>
</html>
